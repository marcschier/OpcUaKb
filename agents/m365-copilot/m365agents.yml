# Microsoft 365 Agents Toolkit configuration for OPC UA Expert
# Provisions the declarative agent app package and uploads to a Microsoft 365 dev tenant.
#
# Usage:
#   1. Open this folder in VS Code with the "Microsoft 365 Agents Toolkit" extension installed
#   2. Sign in to Microsoft 365 in the Agents Toolkit pane
#   3. Run "Provision" from the Lifecycle pane
#
# See https://aka.ms/M365AgentsToolkit for documentation.
version: v1.7

environmentFolderPath: ./env

# Provision lifecycle: validate manifest, build app package, upload to tenant
provision:
  - uses: teamsApp/create
    with:
      name: OPC UA Expert${{APP_NAME_SUFFIX}}
    writeToEnvironmentFile:
      teamsAppId: TEAMS_APP_ID

  - uses: teamsApp/validateManifest
    with:
      manifestPath: ./appPackage/manifest.json

  - uses: teamsApp/zipAppPackage
    with:
      manifestPath: ./appPackage/manifest.json
      outputZipPath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
      outputFolder: ./appPackage/build

  - uses: teamsApp/validateAppPackage
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

  - uses: teamsApp/update
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip

# Deploy lifecycle: nothing to deploy — the agent is fully described by the package
deploy: []

# Publish lifecycle: optionally publish to the tenant App Catalog (admin approval required)
publish:
  - uses: teamsApp/validateAppPackage
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
  - uses: teamsApp/publishAppPackage
    with:
      appPackagePath: ./appPackage/build/appPackage.${{TEAMSFX_ENV}}.zip
