<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" width="720" height="620">
  <defs>
    <linearGradient id="crawl" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dbeafe"/><stop offset="100%" style="stop-color:#bfdbfe"/>
    </linearGradient>
    <linearGradient id="index" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d1fae5"/><stop offset="100%" style="stop-color:#a7f3d0"/>
    </linearGradient>
    <linearGradient id="search" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ede9fe"/><stop offset="100%" style="stop-color:#ddd6fe"/>
    </linearGradient>
    <linearGradient id="serve" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/><stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="620" fill="#f8fafc" rx="12"/>

  <!-- ═══ ROW 1: SOURCES ═══ -->
  <text x="360" y="28" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" letter-spacing="2">SOURCES</text>

  <g filter="url(#shadow)">
    <rect x="80" y="42" width="240" height="60" rx="10" fill="url(#crawl)" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="115" y="68" font-family="Segoe UI, sans-serif" font-size="14" fill="#1e40af" font-weight="600">🌐 OPC Foundation</text>
    <text x="115" y="88" font-family="Segoe UI, sans-serif" font-size="11" fill="#3b82f6">*.opcfoundation.org</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="400" y="42" width="240" height="60" rx="10" fill="url(#crawl)" stroke="#93c5fd" stroke-width="1.5"/>
    <text x="435" y="68" font-family="Segoe UI, sans-serif" font-size="14" fill="#1e40af" font-weight="600">☁️ UA-CloudLibrary</text>
    <text x="435" y="88" font-family="Segoe UI, sans-serif" font-size="11" fill="#3b82f6">REST API · 450+ NodeSets</text>
  </g>

  <!-- Arrows: Sources → Pipeline -->
  <path d="M 200 102 L 200 135" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M 520 102 L 520 135" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrowBlue)" stroke-dasharray="5,3"/>

  <!-- ═══ ROW 2: PIPELINE ═══ -->
  <text x="360" y="150" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" letter-spacing="2">PIPELINE</text>

  <g filter="url(#shadow)">
    <rect x="40" y="164" width="200" height="56" rx="10" fill="url(#index)" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="72" y="189" font-family="Segoe UI, sans-serif" font-size="13" fill="#065f46" font-weight="600">📦 Blob Storage</text>
    <text x="72" y="207" font-family="Segoe UI, sans-serif" font-size="11" fill="#059669">HTML + NodeSet XMLs</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="260" y="164" width="200" height="56" rx="10" fill="url(#index)" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="292" y="189" font-family="Segoe UI, sans-serif" font-size="13" fill="#065f46" font-weight="600">✂️ HTML Chunker</text>
    <text x="292" y="207" font-family="Segoe UI, sans-serif" font-size="11" fill="#059669">+ Embeddings (MI auth)</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="480" y="164" width="200" height="56" rx="10" fill="url(#index)" stroke="#6ee7b7" stroke-width="1.5"/>
    <text x="512" y="189" font-family="Segoe UI, sans-serif" font-size="13" fill="#065f46" font-weight="600">🔧 NodeSet Parser</text>
    <text x="512" y="207" font-family="Segoe UI, sans-serif" font-size="11" fill="#059669">Type hierarchy + summaries</text>
  </g>

  <!-- Arrows: Pipeline → Intelligence -->
  <path d="M 140 220 L 140 262" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 360 220 L 360 262" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 580 220 L 580 262" stroke="#059669" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- ═══ ROW 3: INTELLIGENCE ═══ -->
  <text x="360" y="276" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" letter-spacing="2">INTELLIGENCE</text>

  <g filter="url(#shadow)">
    <rect x="40" y="290" width="200" height="72" rx="10" fill="url(#search)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="72" y="318" font-family="Segoe UI, sans-serif" font-size="14" fill="#5b21b6" font-weight="600">🔍 Search Index</text>
    <text x="72" y="338" font-family="Segoe UI, sans-serif" font-size="11" fill="#7c3aed">Vectors + text + structured</text>
    <text x="72" y="352" font-family="Segoe UI, sans-serif" font-size="11" fill="#7c3aed">180K+ documents</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="260" y="290" width="200" height="72" rx="10" fill="url(#search)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="292" y="318" font-family="Segoe UI, sans-serif" font-size="14" fill="#5b21b6" font-weight="600">🧠 Knowledge Base</text>
    <text x="292" y="338" font-family="Segoe UI, sans-serif" font-size="11" fill="#7c3aed">Azure AI Foundry + GPT-4o</text>
    <text x="292" y="352" font-family="Segoe UI, sans-serif" font-size="11" fill="#7c3aed">RAG synthesis</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="480" y="290" width="200" height="72" rx="10" fill="url(#search)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="512" y="318" font-family="Segoe UI, sans-serif" font-size="14" fill="#5b21b6" font-weight="600">⚙️ MCP Server</text>
    <text x="512" y="338" font-family="Segoe UI, sans-serif" font-size="11" fill="#7c3aed">10 tools · search, validate,</text>
    <text x="512" y="352" font-family="Segoe UI, sans-serif" font-size="11" fill="#7c3aed">compliance, modelling</text>
  </g>

  <!-- Arrows: Intelligence → MCP Endpoints -->
  <path d="M 360 362 L 360 402" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>
  <path d="M 580 362 L 580 402" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrowPurple)"/>

  <!-- ═══ ROW 4: MCP ENDPOINTS ═══ -->
  <text x="360" y="416" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" letter-spacing="2">MCP ENDPOINTS</text>

  <g filter="url(#shadow)">
    <rect x="150" y="430" width="200" height="56" rx="10" fill="url(#search)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="182" y="455" font-family="Segoe UI, sans-serif" font-size="13" fill="#5b21b6" font-weight="600">📡 KB RAG Endpoint</text>
    <text x="182" y="473" font-family="Segoe UI, sans-serif" font-size="11" fill="#7c3aed">Answer synthesis</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="370" y="430" width="200" height="56" rx="10" fill="url(#search)" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="402" y="455" font-family="Segoe UI, sans-serif" font-size="13" fill="#5b21b6" font-weight="600">🔌 Tools Endpoint</text>
    <text x="402" y="473" font-family="Segoe UI, sans-serif" font-size="11" fill="#7c3aed">10 structured tools</text>
  </g>

  <!-- Arrows: Endpoints → Clients -->
  <path d="M 250 486 L 250 524" stroke="#b45309" stroke-width="2" fill="none" marker-end="url(#arrowAmber)"/>
  <path d="M 470 486 L 470 524" stroke="#b45309" stroke-width="2" fill="none" marker-end="url(#arrowAmber)"/>

  <!-- ═══ ROW 5: CLIENTS ═══ -->
  <text x="360" y="538" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b" font-weight="600" text-anchor="middle" letter-spacing="2">CLIENTS</text>

  <g filter="url(#shadow)">
    <rect x="80" y="552" width="170" height="50" rx="10" fill="url(#serve)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="108" y="575" font-family="Segoe UI, sans-serif" font-size="13" fill="#92400e" font-weight="600">🤖 Copilot CLI</text>
    <text x="108" y="592" font-family="Segoe UI, sans-serif" font-size="11" fill="#b45309">GitHub Copilot</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="275" y="552" width="170" height="50" rx="10" fill="url(#serve)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="303" y="575" font-family="Segoe UI, sans-serif" font-size="13" fill="#92400e" font-weight="600">💬 Claude Desktop</text>
    <text x="303" y="592" font-family="Segoe UI, sans-serif" font-size="11" fill="#b45309">Anthropic</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="552" width="170" height="50" rx="10" fill="url(#serve)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="498" y="575" font-family="Segoe UI, sans-serif" font-size="13" fill="#92400e" font-weight="600">🔌 AI Agents</text>
    <text x="498" y="592" font-family="Segoe UI, sans-serif" font-size="11" fill="#b45309">Any MCP client</text>
  </g>
</svg>
