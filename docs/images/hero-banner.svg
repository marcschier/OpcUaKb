<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 120" width="900" height="120">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="120" fill="#f8fafc" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <!-- OPC UA Gear Icon -->
  <g transform="translate(100, 60)">
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#accent)" stroke-width="3.5"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="5" fill="url(#accent)" opacity="0.6"/>
    <g stroke="url(#accent)" stroke-width="3.5">
      <line x1="0" y1="-32" x2="0" y2="-42"/>
      <line x1="28" y1="-16" x2="36" y2="-21"/>
      <line x1="28" y1="16" x2="36" y2="21"/>
      <line x1="0" y1="32" x2="0" y2="42"/>
      <line x1="-28" y1="16" x2="-36" y2="21"/>
      <line x1="-28" y1="-16" x2="-36" y2="-21"/>
    </g>
  </g>
  <!-- Knowledge graph nodes -->
  <g opacity="0.5">
    <circle cx="168" cy="38" r="6" fill="#3b82f6"/>
    <circle cx="192" cy="68" r="5" fill="#8b5cf6"/>
    <circle cx="172" cy="85" r="4" fill="#06b6d4"/>
    <line x1="168" y1="38" x2="192" y2="68" stroke="#8b5cf6" stroke-width="1.5"/>
    <line x1="192" y1="68" x2="172" y2="85" stroke="#06b6d4" stroke-width="1.5"/>
    <line x1="168" y1="38" x2="145" y2="45" stroke="#3b82f6" stroke-width="1.5"/>
  </g>
  <!-- Title -->
  <text x="230" y="52" font-family="Segoe UI, system-ui, sans-serif" font-size="32" font-weight="700" fill="#0f172a" letter-spacing="-0.5">OPC UA Knowledge Base</text>
  <!-- Subtitle -->
  <text x="230" y="80" font-family="Segoe UI, system-ui, sans-serif" font-size="15" fill="#64748b">AI-Powered Specification Search &amp; Analysis via MCP</text>
  <!-- Accent line bottom -->
  <rect x="0" y="115" width="900" height="5" fill="url(#accent)" rx="0" opacity="0.5"/>
</svg>
