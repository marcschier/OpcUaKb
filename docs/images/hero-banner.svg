<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/><line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/><line x1="800" y1="0" x2="800" y2="200"/>
  </g>
  <!-- Decorative circuit nodes (left) -->
  <g opacity="0.25">
    <circle cx="60" cy="50" r="4" fill="#3b82f6"/>
    <circle cx="120" cy="30" r="3" fill="#8b5cf6"/>
    <circle cx="90" cy="80" r="5" fill="#06b6d4"/>
    <circle cx="40" cy="130" r="3" fill="#3b82f6"/>
    <circle cx="130" cy="150" r="4" fill="#8b5cf6"/>
    <line x1="60" y1="50" x2="120" y2="30" stroke="#3b82f6" stroke-width="1"/>
    <line x1="60" y1="50" x2="90" y2="80" stroke="#06b6d4" stroke-width="1"/>
    <line x1="90" y1="80" x2="40" y2="130" stroke="#3b82f6" stroke-width="1"/>
    <line x1="40" y1="130" x2="130" y2="150" stroke="#8b5cf6" stroke-width="1"/>
  </g>
  <!-- Decorative circuit nodes (right) -->
  <g opacity="0.25">
    <circle cx="780" cy="40" r="4" fill="#06b6d4"/>
    <circle cx="830" cy="70" r="3" fill="#3b82f6"/>
    <circle cx="860" cy="120" r="5" fill="#8b5cf6"/>
    <circle cx="810" cy="160" r="3" fill="#06b6d4"/>
    <circle cx="750" cy="140" r="4" fill="#3b82f6"/>
    <line x1="780" y1="40" x2="830" y2="70" stroke="#06b6d4" stroke-width="1"/>
    <line x1="830" y1="70" x2="860" y2="120" stroke="#3b82f6" stroke-width="1"/>
    <line x1="860" y1="120" x2="810" y2="160" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="810" y1="160" x2="750" y2="140" stroke="#3b82f6" stroke-width="1"/>
  </g>
  <!-- OPC UA Gear Icon -->
  <g transform="translate(220, 100)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>
    <!-- Gear teeth -->
    <g stroke="url(#accent)" stroke-width="3" opacity="0.8">
      <line x1="0" y1="-28" x2="0" y2="-36"/>
      <line x1="24" y1="-14" x2="31" y2="-18"/>
      <line x1="24" y1="14" x2="31" y2="18"/>
      <line x1="0" y1="28" x2="0" y2="36"/>
      <line x1="-24" y1="14" x2="-31" y2="18"/>
      <line x1="-24" y1="-14" x2="-31" y2="-18"/>
    </g>
    <!-- Connection arrow to text -->
    <line x1="40" y1="0" x2="70" y2="0" stroke="url(#accent)" stroke-width="2" opacity="0.4" stroke-dasharray="4,3"/>
  </g>
  <!-- Title -->
  <text x="310" y="82" font-family="Segoe UI, system-ui, sans-serif" font-size="38" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">OPC UA Knowledge Base</text>
  <!-- Subtitle -->
  <text x="310" y="115" font-family="Segoe UI, system-ui, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.5">AI-Powered Specification Search &amp; Analysis</text>
  <!-- Tags -->
  <g transform="translate(310, 135)">
    <rect x="0" y="0" width="50" height="22" rx="4" fill="#3b82f6" opacity="0.2"/>
    <text x="25" y="15" font-family="Segoe UI, monospace" font-size="11" fill="#60a5fa" text-anchor="middle">MCP</text>
    <rect x="60" y="0" width="100" height="22" rx="4" fill="#8b5cf6" opacity="0.2"/>
    <text x="110" y="15" font-family="Segoe UI, monospace" font-size="11" fill="#a78bfa" text-anchor="middle">Azure AI Search</text>
    <rect x="170" y="0" width="80" height="22" rx="4" fill="#06b6d4" opacity="0.2"/>
    <text x="210" y="15" font-family="Segoe UI, monospace" font-size="11" fill="#22d3ee" text-anchor="middle">AI Foundry</text>
    <rect x="260" y="0" width="60" height="22" rx="4" fill="#10b981" opacity="0.2"/>
    <text x="290" y="15" font-family="Segoe UI, monospace" font-size="11" fill="#34d399" text-anchor="middle">.NET 10</text>
    <rect x="330" y="0" width="85" height="22" rx="4" fill="#f59e0b" opacity="0.2"/>
    <text x="372" y="15" font-family="Segoe UI, monospace" font-size="11" fill="#fbbf24" text-anchor="middle">180K+ docs</text>
  </g>
  <!-- Accent line bottom -->
  <rect x="0" y="194" width="900" height="6" fill="url(#accent)" rx="0" opacity="0.7"/>
</svg>
